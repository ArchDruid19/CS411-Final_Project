<!DOCTYPE html>
<html>

<head>
    <title>Inventory Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 220px;
            background: #1f2937;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f3f4f6;
        }

        .card {
            background: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Dashboard</h2>

        <a href="/dashboard">Dashboard</a>
        <a href="/items">Items</a>
        <a href="/employees">Employees</a>
        <a href="/customers">Customers</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
