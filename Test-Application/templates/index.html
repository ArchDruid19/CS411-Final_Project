{% extends "base.html" %}

{% block content %}
<h1>Items</h1>

{% for item in items %}
    <div class="card">
        <a href="/item/{{ item.itemID }}">
            <strong>{{ item.itemName }}</strong>
        </a>
        <div>Type: {{ item.itemType }}</div>
        <div>Material: {{ item.metalType }}</div>
    </div>
{% endfor %}

{% endblock %}
